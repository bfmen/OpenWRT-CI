#云编译公用核心
name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_CONFIG:
        required: true
        type: string
      WRT_THEME:
        required: true
        type: string
      WRT_NAME:
        required: true
        type: string
      WRT_SSID:
        required: true
        type: string
      WRT_WORD:
        required: true
        type: string
      WRT_IP:
        required: true
        type: string
      WRT_PW:
        required: true
        type: string
      WRT_REPO:
        required: true
        type: string
      WRT_BRANCH:
        required: true
        type: string
      WRT_SOURCE:
        required: true
        type: string
      WRT_PACKAGE:
        required: false
        type: string
      WRT_TEST:
        required: false
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_CONFIG: ${{inputs.WRT_CONFIG}}
  WRT_THEME: ${{inputs.WRT_THEME}}
  WRT_NAME: ${{inputs.WRT_NAME}}
  WRT_SSID: ${{inputs.WRT_SSID}}
  WRT_WORD: ${{inputs.WRT_WORD}}
  WRT_IP: ${{inputs.WRT_IP}}
  WRT_PW: ${{inputs.WRT_PW}}
  WRT_REPO: ${{inputs.WRT_REPO}}
  WRT_BRANCH: ${{inputs.WRT_BRANCH}}
  WRT_SOURCE: ${{inputs.WRT_SOURCE}}
  WRT_PACKAGE: ${{inputs.WRT_PACKAGE}}
  WRT_TEST: ${{inputs.WRT_TEST}}

jobs:
  core:
    name: ${{inputs.WRT_SOURCE}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          sudo ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt

      - name: Initialization Values
        run: |
          echo "WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> $GITHUB_ENV
          echo "WRT_TARGET=$(grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)' ./Config/$WRT_CONFIG.txt)" >> $GITHUB_ENV
          echo "WRT_WIFI=wifi-yes" >> $GITHUB_ENV
          echo "WRT_KVER=none" >> $GITHUB_ENV
          echo "WRT_LIST=none" >> $GITHUB_ENV

      - name: Clone Code
        run: |
          git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/

          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

          # GitHub Action 移除国内下载源
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Check Scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Restore Caches
        id: cache
        if: env.WRT_TEST != 'true'
        uses: ysuolmai/openwrt-smart-cache/restore@v1
        with:
          config-file: ./Config/${{env.WRT_CONFIG}}.txt

      - name: Update Caches
        if: env.WRT_TEST != 'true'
        run: |
          # 只有当上一次 Compile Toolchain 真的跑完(写了 sentinel)才相信
          # restore 进来的 staging_dir。否则即使有 staging_dir 也可能是
          # partial cache (历史 bug 或者编译被取消导致)，touch stamps 会
          # 把 make 骗成"已完成"→ 又 save 一份 partial → 死循环。
          # sentinel 路径在 staging_dir/host/ 下,这个目录在 toolchain
          # cache (staging_dir/host*) 的路径范围内,所以会跟着 cache 走。
          if [ -f "./wrt/staging_dir/host/.smart-cache-tc-complete" ]; then
            find "./wrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
              find "$DIR" -type f -exec touch {} +
            done

            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build

            echo "✓ toolchain sentinel present — stamps touched, make will skip toolchain rebuild"
          elif [ -d "./wrt/staging_dir" ]; then
            echo "⚠ staging_dir restored but toolchain sentinel missing — partial cache suspected, will rebuild from scratch"
          else
            echo "caches missed!"
          fi

      - name: Update Feeds
        run: |
          cd ./wrt/

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Packages
        run: |
          cd ./wrt/package/

          $GITHUB_WORKSPACE/Scripts/Packages.sh
          $GITHUB_WORKSPACE/Scripts/Handles.sh

      - name: Custom Settings
        run: |
          cd ./wrt/

          if [[ "${WRT_CONFIG,,}" == *"test"* ]]; then
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt >> .config
          else
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          fi

          $GITHUB_WORKSPACE/Scripts/Settings.sh
          $GITHUB_WORKSPACE/Scripts/diy.sh
          
          make defconfig -j$(nproc) && make clean -j$(nproc)

      - name: Download Packages
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make download -j$(nproc)

      - name: Save Dl Cache
        if: env.WRT_TEST != 'true' 
        uses: ysuolmai/openwrt-smart-cache/save-dl@v1
        with:
          cache-key: ${{steps.cache.outputs.dl-key}}

      - name: Compile Toolchain
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make tools/install -j$(nproc)     || make tools/install -j1 V=s
          make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s

          # 标记 toolchain 编译完成。只有两条 make 都返回 0 才会到这里 ——
          # 这就是 Update Caches 步用来区分"完整 cache"和"partial cache"
          # 的 sentinel。sentinel 在 staging_dir/host/ 下,会被 save-toolchain
          # 一起存进 cache,下次 restore 后 Update Caches 能看到它。
          mkdir -p staging_dir/host
          touch staging_dir/host/.smart-cache-tc-complete

          # 调试: 打印 toolchain cache 范围内各子目录的真实大小,确认
          # smart-cache 的 path glob (staging_dir/host* + staging_dir/tool*)
          # 是否真覆盖到 toolchain-*。如果看不到 toolchain-* 行,就是
          # glob 没匹配上,要修 smart-cache 的 path。
          echo "::group::staging_dir contents pre-save"
          du -sh staging_dir/* 2>/dev/null | sort -h || true
          echo "---host* glob 匹配:---"
          ls -d staging_dir/host* 2>/dev/null || echo "  (none)"
          echo "---tool* glob 匹配:---"
          ls -d staging_dir/tool* 2>/dev/null || echo "  (none)"
          echo "---.ccache 大小:---"
          du -sh .ccache 2>/dev/null || echo "  (.ccache 不存在)"
          echo "::endgroup::"

      - name: Save Toolchain Cache
        if: env.WRT_TEST != 'true' 
        uses: ysuolmai/openwrt-smart-cache/save-toolchain@v1
        with:
          cache-key: ${{steps.cache.outputs.toolchain-key}}

      - name: Compile Packages
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          # 先编 target（kernel + DTB），否则 kmod 类包（gpio-button-hotplug
          # / mtd-rw 等）找不到 linux-X.Y.Z/.config 会 fail。
          # smart-cache README 的示例漏了这一步。
          make target/compile -j$(nproc)  || make target/compile -j1 V=s
          make package/compile -j$(nproc) || make package/compile -j1 V=s

      - name: Save Staging Cache
        if: env.WRT_TEST != 'true' 
        uses: ysuolmai/openwrt-smart-cache/save-staging@v1
        with:
          cache-key: ${{steps.cache.outputs.staging-key}}

      - name: Compile Firmware
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make -j$(nproc) || make -j1 V=s

      - name: Machine Information
        run: |
          cd ./wrt/

          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        run: |
          cd ./wrt/ && mkdir ./upload/

          cp -f ./.config ./upload/Config-"$WRT_CONFIG"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_DATE".txt

          if [[ $WRT_TEST != 'true' ]]; then
            echo "WRT_KVER=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^kernel - \K[\d\.]+' {} \;)" >> $GITHUB_ENV
            echo "WRT_LIST=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^luci-(app|theme)[^ ]*' {} \; | tr '\n' ' ')" >> $GITHUB_ENV

            find ./bin/targets/ -iregex ".*\(buildinfo\|json\|sha256sums\|packages\)$" -exec rm -rf {} +

            for FILE in $(find ./bin/targets/ -type f -iname "*$WRT_TARGET*") ; do
              EXT=$(basename $FILE | cut -d '.' -f 2-)
              NAME=$(basename $FILE | cut -d '.' -f 1 | grep -io "\($WRT_TARGET\).*")
              NEW_FILE="$NAME"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_WIFI"-"$WRT_DATE"."$EXT"
              mv -f $FILE ./upload/$NEW_FILE
            done

            find ./bin/targets/ -type f -exec mv -f {} ./upload/ \;

            make clean -j$(nproc)
          fi

      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_BRANCH}}-${{env.WRT_DATE}}
          files: ./wrt/upload/*.*
          body: |
            这是个平台固件包，内含多个设备！
            请注意选择你需要的设备固件！
            不要问，刷就完事了！

            全系带开源硬件加速，别问了！

            源码：${{env.WRT_REPO}}
            分支：${{env.WRT_BRANCH}}
            提交：${{env.WRT_HASH}}

            配置：${{env.WRT_CONFIG}}
            平台：${{env.WRT_TARGET}}

            登录地址：${{env.WRT_IP}}
            登录密码：${{env.WRT_PW}}

            WIFI名称：${{env.WRT_SSID}}
            WIFI密码：${{env.WRT_WORD}}

            内核版本：${{env.WRT_KVER}}
            插件列表：${{env.WRT_LIST}}
