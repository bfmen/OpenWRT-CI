name: Auto-Clean

on:
  #自动清理：每天早上5点
  schedule:
    - cron: '0 21 * * *'
  #手动清理
  workflow_dispatch:
    inputs:
      keep_per_config:
        description: '每个 CONFIG 保留最新版本数（默认 1）'
        default: '1'
        required: false

permissions: write-all

jobs:
  auto_clean:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old Releases (keep latest per CONFIG)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_N: ${{ inputs.keep_per_config || '1' }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, re, subprocess, os, sys
          from collections import defaultdict

          keep_n = int(os.environ.get('KEEP_N', '1'))
          repo   = os.environ.get('REPO', '')

          result = subprocess.run(
              ['gh', 'release', 'list', '--repo', repo, '--limit', '300', '--json', 'tagName,createdAt'],
              capture_output=True, text=True
          )
          if result.stderr:
              print(f"[gh stderr] {result.stderr.strip()}", file=sys.stderr)
          if result.returncode != 0:
              print(f"gh release list 失败 (exit {result.returncode})，退出")
              sys.exit(1)
          if not result.stdout.strip() or result.stdout.strip() == '[]':
              print("没有找到任何 Release，跳过清理")
              sys.exit(0)

          releases = json.loads(result.stdout)
          print(f"找到 {len(releases)} 个 Release")

          groups = defaultdict(list)
          for r in releases:
              tag = r['tagName']
              # CONFIG = 去掉末尾的 -YY.MM.DD-HH.MM.SS
              config = re.sub(r'-\d{2}\.\d{2}\.\d{2}-\d{2}\.\d{2}\.\d{2}$', '', tag)
              groups[config].append((r['createdAt'], tag))

          to_delete = []
          for config, items in sorted(groups.items()):
              items.sort(key=lambda x: x[0], reverse=True)
              kept = [t for _, t in items[:keep_n]]
              old  = [t for _, t in items[keep_n:]]
              print(f"\n[{config}]")
              print(f"  保留: {kept}")
              if old:
                  print(f"  删除: {old}")
              to_delete.extend(old)

          print(f"\n共删除 {len(to_delete)} 个 Release\n")
          for tag in to_delete:
              print(f"-> 删除 {tag}")
              subprocess.run(
                  ['gh', 'release', 'delete', '--repo', repo, tag, '--yes', '--cleanup-tag'],
                  check=True
              )
          print("Release 清理完成")
          EOF

      - name: Delete Workflow Runs (skip running)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "清理 Workflow Runs（跳过运行中）..."
          gh run list --repo "$REPO" --limit 500 --json databaseId,status \
            | jq -r '.[] | select(.status == "completed") | .databaseId' \
            | xargs -r -I{} gh run delete --repo "$REPO" {} --yes
          echo "Workflow Runs 清理完成"
